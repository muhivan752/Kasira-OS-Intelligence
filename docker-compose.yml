version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/auth/app/version')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kasira_db}
      POSTGRES_USER: ${POSTGRES_USER:-kasira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kasira_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port TIDAK di-expose ke host — hanya internal Docker network
    expose:
      - "5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kasira} -d ${POSTGRES_DB:-kasira_db}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    # Port TIDAK di-expose ke host — hanya internal Docker network
    expose:
      - "6379"
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_SECURE_COOKIES=true
      - NEXT_PUBLIC_GA_ID=${NEXT_PUBLIC_GA_ID:-}
      - NODE_OPTIONS=--max-old-space-size=384
    volumes:
      # APK files — bind mount supaya container recreate gak ngeilangin file
      # (gotcha #9 CLAUDE.md). Route.ts baca dari kedua path: primary
      # /app/public/apk + fallback /app/.next/standalone/public/apk.
      # Read-only — APK update via host `./public/apk/` lalu otomatis kebaca container.
      - ./public/apk:/app/public/apk:ro
      - ./public/apk:/app/.next/standalone/public/apk:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  postgres_data:
  uploads_data:
  redis_data:
