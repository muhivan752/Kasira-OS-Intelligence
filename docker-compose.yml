version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    restart: always
    volumes:
      - uploads_data:/app/uploads

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kasira_db}
      POSTGRES_USER: ${POSTGRES_USER:-kasira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kasira_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.next
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  uploads_data:
