name: Build & Release Kasira Flutter APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      is_mandatory:
        description: 'Force update? (true/false)'
        required: false
        default: 'false'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: flutter pub get
        working-directory: kasir_app

      - name: Generate Code (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: kasir_app

      - name: Recreate Platform Directories
        run: |
          flutter create .
          rm -rf test/widget_test.dart
        working-directory: kasir_app

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        working-directory: kasir_app

      - name: Analyze Dart Code
        continue-on-error: true
        run: flutter analyze
        working-directory: kasir_app

      - name: Build POS APK Release
        run: flutter build apk --release --target lib/main.dart
        working-directory: kasir_app

      - name: Rename POS APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kasira-pos-v${VERSION}.apk
        working-directory: kasir_app

      - name: Build Dapur APK Release
        run: flutter build apk --release --target lib/main_dapur.dart
        working-directory: kasir_app

      - name: Rename Dapur APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kasira-dapur-v${VERSION}.apk
        working-directory: kasir_app

      # ── Generate version.json → commit ke repo (Flutter baca via raw.githubusercontent.com) ──
      - name: Generate & Commit version.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IS_MANDATORY="${{ github.event.inputs.is_mandatory }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          REPO="muhivan752/Kasira-OS-Intelligence"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          cat > version.json <<EOF
          {
            "pos": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${BASE_URL}/kasira-pos-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            },
            "dapur": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${BASE_URL}/kasira-dapur-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            }
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: update version.json → v${VERSION}" || echo "No changes to commit"
          git push

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kasira-Release-APKs-v${{ github.event.inputs.version }}
          path: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Kasira v${{ github.event.inputs.version }}
          body: |
            ## Kasira v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ### Info Update
            - **Force Update**: ${{ github.event.inputs.is_mandatory }}
            - **Build**: #${{ github.run_number }}
            - **Platform**: Android

            ### APK yang Tersedia
            | APK | Deskripsi |
            |-----|-----------|
            | `kasira-pos-v*.apk` | Aplikasi kasir utama (POS) |
            | `kasira-dapur-v*.apk` | Aplikasi kitchen display untuk dapur |

            ### version.json URL (untuk Flutter update checker)
            ```
            https://raw.githubusercontent.com/muhivan752/Kasira-OS-Intelligence/main/version.json
            ```

            ### Cara Install
            1. Download APK yang sesuai
            2. Aktifkan "Install dari sumber tidak dikenal" di pengaturan Android
            3. Install APK
          draft: false
          prerelease: false
          files: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
