name: Build & Release Kasira Flutter APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      is_mandatory:
        description: 'Force update? (true/false)'
        required: false
        default: 'false'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: flutter pub get
        working-directory: kasir_app

      - name: Generate Code (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: kasir_app

      - name: Recreate Platform Directories
        run: |
          flutter create .
          rm -rf test/widget_test.dart
        working-directory: kasir_app

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        working-directory: kasir_app

      - name: Analyze Dart Code
        continue-on-error: true
        run: flutter analyze
        working-directory: kasir_app

      - name: Build APK Release
        run: flutter build apk --release
        working-directory: kasir_app

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv kasir_app/build/app/outputs/flutter-apk/app-release.apk \
             kasir_app/build/app/outputs/flutter-apk/kasira-v${VERSION}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kasira-Release-APK-v${{ github.event.inputs.version }}
          path: kasir_app/build/app/outputs/flutter-apk/kasira-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Kasira POS v${{ github.event.inputs.version }}
          body: |
            ## Kasira POS v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ### Info Update
            - **Force Update**: ${{ github.event.inputs.is_mandatory }}
            - **Build**: #${{ github.run_number }}
            - **Platform**: Android

            ### Cara Install
            1. Download file `kasira-v${{ github.event.inputs.version }}.apk`
            2. Aktifkan "Install dari sumber tidak dikenal" di pengaturan Android
            3. Install APK
          draft: false
          prerelease: false
          files: kasir_app/build/app/outputs/flutter-apk/kasira-v${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
