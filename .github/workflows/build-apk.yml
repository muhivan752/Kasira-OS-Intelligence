name: Build & Release Kasira Flutter APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      is_mandatory:
        description: 'Force update? (true/false/auto). "auto" = preserve nilai di version.json (kalau version match), fallback false.'
        required: false
        default: 'auto'
      release_notes:
        description: 'Release notes. Kosong = preserve dari version.json (kalau version match), fallback "Bug fixes and improvements".'
        required: false
        default: ''

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: flutter pub get
        working-directory: kasir_app

      - name: Generate Code (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: kasir_app

      - name: Recreate Platform Directories
        run: |
          flutter create --org com.kasira --project-name kasira_kasir .
          rm -rf test/widget_test.dart
        working-directory: kasir_app

      - name: Patch AndroidManifest — wajib INTERNET permission
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          echo "=== Manifest sebelum patch ==="
          cat $MANIFEST
          # Tulis ulang manifest dengan permissions lengkap
          cat > $MANIFEST << 'MANIFEST_EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30"/>
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <application
                  android:label="Kasira"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2"/>
              </application>
          </manifest>
          MANIFEST_EOF
          echo "=== Manifest setelah patch ==="
          cat $MANIFEST
        working-directory: kasir_app

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        working-directory: kasir_app

      - name: Analyze Dart Code
        continue-on-error: true
        run: flutter analyze
        working-directory: kasir_app

      - name: Build POS APK Release
        run: flutter build apk --release --target lib/main.dart
        working-directory: kasir_app

      - name: Rename POS APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kasira-pos-v${VERSION}.apk
        working-directory: kasir_app

      - name: Build Dapur APK Release
        run: flutter build apk --release --target lib/main_dapur.dart
        working-directory: kasir_app

      - name: Rename Dapur APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kasira-dapur-v${VERSION}.apk
        working-directory: kasir_app

      # ── Generate version.json → commit ke repo (Flutter baca via raw.githubusercontent.com) ──
      - name: Generate & Commit version.json
        id: gen_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IS_MANDATORY="${{ github.event.inputs.is_mandatory }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          REPO="muhivan752/Kasira-OS-Intelligence"
          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

          # Resolve is_mandatory + release_notes:
          # - "auto"/kosong → pakai existing version.json kalau version match, else default
          # - nilai eksplisit → pakai itu (overwrite)
          if [ -f version.json ]; then
            EXISTING_VERSION=$(jq -r '.pos.version // ""' version.json)
            EXISTING_MANDATORY=$(jq -r '.pos.is_mandatory // false' version.json)
            EXISTING_NOTES=$(jq -r '.pos.release_notes // ""' version.json)
          else
            EXISTING_VERSION=""
            EXISTING_MANDATORY="false"
            EXISTING_NOTES=""
          fi

          if [ "$IS_MANDATORY" = "auto" ]; then
            if [ "$EXISTING_VERSION" = "$VERSION" ]; then
              IS_MANDATORY="$EXISTING_MANDATORY"
              echo "is_mandatory preserved from existing version.json: $IS_MANDATORY"
            else
              IS_MANDATORY="false"
              echo "is_mandatory fallback to false (version bump or no existing)"
            fi
          fi

          if [ -z "$NOTES" ]; then
            if [ "$EXISTING_VERSION" = "$VERSION" ] && [ -n "$EXISTING_NOTES" ] && [ "$EXISTING_NOTES" != "null" ]; then
              NOTES="$EXISTING_NOTES"
              echo "release_notes preserved from existing version.json"
            else
              NOTES="Bug fixes and improvements"
              echo "release_notes fallback to default"
            fi
          fi

          cat > version.json <<EOF
          {
            "pos": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${BASE_URL}/kasira-pos-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            },
            "dapur": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${BASE_URL}/kasira-dapur-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            }
          }
          EOF

          git add version.json
          git commit -m "chore: update version.json → v${VERSION}" || echo "No changes to commit"
          git push origin main || echo "Push failed, continuing to release"

          # Expose resolved values untuk step "Create GitHub Release" (multi-line safe)
          echo "is_mandatory=${IS_MANDATORY}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<NOTES_EOF"
            echo "${NOTES}"
            echo "NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kasira-Release-APKs-v${{ github.event.inputs.version }}
          path: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Kasira v${{ github.event.inputs.version }}
          body: |
            ## Kasira v${{ github.event.inputs.version }}

            ${{ steps.gen_version.outputs.release_notes }}

            ### Info Update
            - **Force Update**: ${{ steps.gen_version.outputs.is_mandatory }}
            - **Build**: #${{ github.run_number }}
            - **Platform**: Android

            ### APK yang Tersedia
            | APK | Deskripsi |
            |-----|-----------|
            | `kasira-pos-v*.apk` | Aplikasi kasir utama (POS) |
            | `kasira-dapur-v*.apk` | Aplikasi kitchen display untuk dapur |

            ### version.json URL (untuk Flutter update checker)
            ```
            https://raw.githubusercontent.com/muhivan752/Kasira-OS-Intelligence/main/version.json
            ```

            ### Cara Install
            1. Download APK yang sesuai
            2. Aktifkan "Install dari sumber tidak dikenal" di pengaturan Android
            3. Install APK
          draft: false
          prerelease: false
          files: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
