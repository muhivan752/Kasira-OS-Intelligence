name: Build & Release Kasira Flutter APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        default: '1.0.0'
      is_mandatory:
        description: 'Force update? (true/false)'
        required: false
        default: 'false'
      release_notes:
        description: 'Release notes'
        required: false
        default: 'Bug fixes and improvements'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Flutter Packages
        run: flutter pub get
        working-directory: kasir_app

      - name: Generate Code (Build Runner)
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: kasir_app

      - name: Recreate Platform Directories
        run: |
          flutter create .
          rm -rf test/widget_test.dart
        working-directory: kasir_app

      - name: Update version in pubspec.yaml
        run: |
          VERSION="${{ github.event.inputs.version }}"
          BUILD_NUMBER="${{ github.run_number }}"
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUMBER}/" pubspec.yaml
        working-directory: kasir_app

      - name: Analyze Dart Code
        continue-on-error: true
        run: flutter analyze
        working-directory: kasir_app

      - name: Build POS APK Release
        run: flutter build apk --release --target lib/main.dart
        working-directory: kasir_app

      - name: Build Dapur APK Release
        run: flutter build apk --release --target lib/main_dapur.dart
        working-directory: kasir_app

      - name: Rename APKs
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mv kasir_app/build/app/outputs/flutter-apk/app-release.apk \
             kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${VERSION}.apk
          # POS APK was built first, rename the one in the staging dir
        shell: bash

      - name: Rename POS APK
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Re-build POS to get clean output file
          flutter build apk --release --target lib/main.dart
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/kasira-pos-v${VERSION}.apk
        working-directory: kasir_app

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kasira-Release-APKs-v${{ github.event.inputs.version }}
          path: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk

      # ── Upload ke Cloudflare R2 (Golden Rule #14 — APK hosted di R2) ────────
      - name: Upload APKs to Cloudflare R2
        if: ${{ secrets.R2_ACCOUNT_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          VERSION="${{ github.event.inputs.version }}"
          IS_MANDATORY="${{ github.event.inputs.is_mandatory }}"
          NOTES="${{ github.event.inputs.release_notes }}"
          APK_DIR="kasir_app/build/app/outputs/flutter-apk"
          BUCKET="${{ secrets.R2_BUCKET }}"
          PUB_URL="${{ secrets.R2_PUBLIC_URL }}"

          pip install awscli --quiet

          # Upload kedua APK ke R2 bucket
          aws s3 cp "${APK_DIR}/kasira-pos-v${VERSION}.apk" \
            "s3://${BUCKET}/apk/kasira-pos-v${VERSION}.apk" \
            --endpoint-url "${R2_ENDPOINT}"

          aws s3 cp "${APK_DIR}/kasira-dapur-v${VERSION}.apk" \
            "s3://${BUCKET}/apk/kasira-dapur-v${VERSION}.apk" \
            --endpoint-url "${R2_ENDPOINT}"

          # Buat version.json — dibaca Flutter saat startup (Golden Rule #14 + #15)
          cat > /tmp/version.json <<VEOF
          {
            "pos": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${PUB_URL}/apk/kasira-pos-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            },
            "dapur": {
              "version": "${VERSION}",
              "is_mandatory": ${IS_MANDATORY},
              "download_url": "${PUB_URL}/apk/kasira-dapur-v${VERSION}.apk",
              "release_notes": "${NOTES}"
            }
          }
          VEOF

          # Upload version.json dengan cache-control no-cache agar Flutter selalu baca terbaru
          aws s3 cp /tmp/version.json \
            "s3://${BUCKET}/version.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --content-type "application/json" \
            --cache-control "no-cache, no-store"

          echo "✅ APK dan version.json berhasil di-upload ke R2"
          echo "POS URL: ${PUB_URL}/apk/kasira-pos-v${VERSION}.apk"
          echo "Dapur URL: ${PUB_URL}/apk/kasira-dapur-v${VERSION}.apk"
          echo "version.json URL: ${PUB_URL}/version.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Kasira v${{ github.event.inputs.version }}
          body: |
            ## Kasira v${{ github.event.inputs.version }}

            ${{ github.event.inputs.release_notes }}

            ### Info Update
            - **Force Update**: ${{ github.event.inputs.is_mandatory }}
            - **Build**: #${{ github.run_number }}
            - **Platform**: Android

            ### APK yang Tersedia
            | APK | Deskripsi |
            |-----|-----------|
            | `kasira-pos-v*.apk` | Aplikasi kasir utama (POS) |
            | `kasira-dapur-v*.apk` | Aplikasi kitchen display untuk dapur |

            ### Cara Install
            1. Download APK yang sesuai
            2. Aktifkan "Install dari sumber tidak dikenal" di pengaturan Android
            3. Install APK
          draft: false
          prerelease: false
          files: |
            kasir_app/build/app/outputs/flutter-apk/kasira-pos-v${{ github.event.inputs.version }}.apk
            kasir_app/build/app/outputs/flutter-apk/kasira-dapur-v${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
