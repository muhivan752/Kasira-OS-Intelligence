  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';

      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));

    // events at the element — warn only; real JS errors carry message/error.

      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker

    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageTexts = {};

    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded

    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.

      ? window.origin
      : '*';

      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.

        (e.origin === 'null' &&

        (/^file:/.test(e.origin) && window.origin === 'null')

    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];

            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);

        console.error('Failed to decode asset ' + uuid + ':', err);

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:14.5px; font-weight:600; color:#2C3833;\">Tab meja tetap jalan sampai semua lunas<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAIN → SOLUTION (dark) -->\n  <div style=\"background:#0A0F0D; color:#E9EEEB; margin-top:80px;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:76px 24px;\">\n      <div class=\"kl-reveal\" style=\"font-family:ui-monospace,monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#34D399; font-weight:600; margin-bottom:14px;\">Yang bikin pusing → beres<\u002Fdiv>\n      <h2 class=\"kl-reveal\" data-delay=\"60\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(26px,3.6vw,40px); letter-spacing:-0.03em; line-height:1.08; margin:0 0 44px; max-width:560px;\">Kamu udah kenal masalahnya. Kami bikin solusinya.<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:20px;\">\n        <sc-for list=\"{{ pains }}\" as=\"p\" hint-placeholder-count=\"4\">\n          <div class=\"kl-reveal\" style=\"border-top:1px solid #22302A; padding-top:20px;\">\n            <div style=\"font-size:13.5px; color:#8CA095; line-height:1.5; text-decoration:line-through; text-decoration-color:#3A4A42;\">{{ p.bad }}<\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:8px; margin-top:12px;\">\n              <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#34D399\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; margin-top:1px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n              <div style=\"font-size:15px; font-weight:700; color:#fff; line-height:1.35;\">{{ p.good }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- DIFFERENTIATORS -->\n  <div id=\"beda\" style=\"max-width:1180px; margin:0 auto; padding:96px 24px;\">\n    <div class=\"kl-reveal\" style=\"max-width:620px; margin-bottom:56px;\">\n      <div style=\"font-family:ui-monospace,monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#059669; font-weight:600; margin-bottom:14px;\">Bukan kasir biasa<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,4vw,44px); letter-spacing:-0.03em; line-height:1.05; margin:0 0 16px; color:#0B1512;\">Empat hal yang nggak dipunya kompetitor.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.6; color:#4B5750; font-weight:500; margin:0;\">Moka, Pawoon, Olsera — bagus, tapi kerasa \"barat\". Ini bagian yang kami bikin khusus buat cara jualan orang Indonesia.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column;\">\n      <sc-for list=\"{{ diffs }}\" as=\"d\" hint-placeholder-count=\"4\">\n        <div class=\"kl-reveal kl-diff-row\" style=\"display:grid; grid-template-columns:120px 1fr; gap:32px; padding:36px 24px; margin:0 -24px; border-radius:18px; border-top:1px solid #EAE8E1; align-items:start;\">\n          <div class=\"kl-diff-no\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:52px; letter-spacing:-0.04em; color:#D8E6DF; line-height:1;\">{{ d.no }}<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:1fr; gap:14px;\">\n            <h3 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(21px,2.6vw,28px); letter-spacing:-0.02em; color:#0B1512; margin:0; max-width:640px;\">{{ d.title }}<\u002Fh3>\n            <p style=\"font-size:16px; line-height:1.6; color:#4B5750; font-weight:500; margin:0; max-width:640px;\">{{ d.body }}<\u002Fp>\n            <div style=\"display:inline-flex; align-items:center; gap:8px; margin-top:2px;\">\n              <span style=\"font-family:ui-monospace,monospace; font-size:12px; font-weight:600; letter-spacing:0.04em; color:#059669; background:#ECFDF5; border:1px solid #C9F0DD; border-radius:999px; padding:5px 12px;\">{{ d.tag }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FEATURE STRIP -->\n  <div id=\"fitur\" style=\"background:#F2F4F0; border-top:1px solid #E7EAE4; border-bottom:1px solid #E7EAE4;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:80px 24px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n        <sc-for list=\"{{ pillars }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <div class=\"kl-reveal kl-card-h\" style=\"background:#fff; border:1px solid #E7EAE4; border-radius:18px; padding:24px;\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:18px; color:#0B1512; letter-spacing:-0.01em;\">{{ f.title }}<\u002Fdiv>\n            <p style=\"font-size:14.5px; line-height:1.6; color:#4B5750; font-weight:500; margin:10px 0 16px;\">{{ f.body }}<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <sc-for list=\"{{ f.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex; align-items:center; gap:9px; font-size:13.5px; font-weight:600; color:#2C3833;\">\n                  <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#059669\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                  {{ it }}\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PRICING -->\n  <div id=\"harga\" style=\"max-width:1180px; margin:0 auto; padding:96px 24px;\">\n    <div class=\"kl-reveal\" style=\"text-align:center; max-width:620px; margin:0 auto 56px;\">\n      <div style=\"font-family:ui-monospace,monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#059669; font-weight:600; margin-bottom:14px;\">Harga<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,4vw,44px); letter-spacing:-0.03em; line-height:1.05; margin:0 0 14px; color:#0B1512;\">Masuk akal buat UMKM.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.6; color:#4B5750; font-weight:500; margin:0;\">Mulai gratis, bayar pas bisnis udah jalan. Transparan, tanpa biaya nyempil.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:22px; align-items:start; max-width:760px; margin:0 auto;\">\n      <sc-for list=\"{{ plans }}\" as=\"pl\" hint-placeholder-count=\"2\">\n        <div class=\"kl-reveal kl-card-h\" style=\"background:{{ pl.cardBg }}; border:{{ pl.cardBorder }}; border-radius:22px; padding:30px; box-shadow:{{ pl.shadow }}; position:relative;\">\n          <div style=\"display:inline-flex; align-items:center; white-space:nowrap; font-size:11px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:5px 11px; border-radius:999px; background:{{ pl.badgeBg }}; color:{{ pl.badgeColor }};\">{{ pl.badge }}<\u002Fdiv>\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:22px; color:{{ pl.nameColor }}; margin-top:18px;\">{{ pl.name }}<\u002Fdiv>\n          <div style=\"font-size:13.5px; color:{{ pl.subColor }}; font-weight:500; margin-top:4px;\">{{ pl.tagline }}<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:4px; margin-top:20px;\">\n            <span style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:40px; letter-spacing:-0.02em; color:{{ pl.nameColor }};\">{{ pl.price }}<\u002Fspan>\n            <span style=\"font-size:14px; font-weight:600; color:{{ pl.subColor }};\">/bln<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; margin:24px 0 26px;\">\n            <sc-for list=\"{{ pl.features }}\" as=\"ft\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:flex-start; gap:10px; font-size:14px; font-weight:600; color:{{ pl.featColor }};\">\n                <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"{{ pl.checkColor }}\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0; margin-top:1px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                {{ ft }}\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <a href=\"{{ pl.ctaLink }}\" class=\"kl-btn-o\" style=\"display:block; text-align:center; padding:14px; border-radius:13px; font-size:15px; font-weight:700; background:{{ pl.ctaBg }}; color:{{ pl.ctaColor }}; border:{{ pl.ctaBorder }};\">{{ pl.cta }}<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"text-align:center; font-size:13px; color:#8A938D; font-weight:500; margin-top:22px;\">Demo toko pakai data contoh. Pro lagi tahap early access — feedback kamu kami dengerin.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- FOUNDER STORY -->\n  <div id=\"cerita\" style=\"background:#0A0F0D; color:#E9EEEB;\">\n    <div style=\"max-width:900px; margin:0 auto; padding:88px 24px; text-align:center;\">\n      <div style=\"font-family:ui-monospace,monospace; font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#34D399; font-weight:600; margin-bottom:24px;\">Kenapa Kasira ada<\u002Fdiv>\n      <p class=\"kl-reveal\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:clamp(22px,3.2vw,34px); line-height:1.35; letter-spacing:-0.02em; color:#fff; margin:0 0 28px;\">\n        \"Gue bikin Kasira karena POS yang ada kerasa terlalu 'barat' buat warkop Indonesia. Split bill bagi rata? Warkop beneran nggak gitu — orang bayar punya dia sendiri, ada yang nyusul, ada yang pulang duluan. Itu yang Kasira beresin.\"\n      <\u002Fp>\n      <div style=\"margin-top:36px; padding-top:28px; border-top:1px solid #22302A; font-size:14.5px; color:#8CA095; line-height:1.6; font-weight:500;\">\n        Kami lagi di fase pra-pilot. 10 cafe pertama yang gabung bantu bentuk produknya — dan dapet 2 bulan Pro gratis.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FAQ -->\n  <div style=\"max-width:820px; margin:0 auto; padding:88px 24px;\">\n    <h2 class=\"kl-reveal\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(26px,3.6vw,38px); letter-spacing:-0.03em; text-align:center; color:#0B1512; margin:0 0 44px;\">Pertanyaan yang sering muncul<\u002Fh2>\n    <div style=\"display:flex; flex-direction:column; gap:12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"q\" hint-placeholder-count=\"5\">\n        <div class=\"kl-reveal\" style=\"background:#fff; border:1px solid #E7E5DE; border-radius:16px; overflow:hidden;\">\n          <button sc-camel-on-click=\"{{ q.onToggle }}\" style=\"width:100%; display:flex; align-items:center; justify-content:space-between; gap:16px; text-align:left; background:none; border:none; cursor:pointer; padding:19px 22px; font-family:'Plus Jakarta Sans',sans-serif; font-size:16px; font-weight:700; color:#0B1512;\">\n            {{ q.q }}\n            <span style=\"flex-shrink:0; transform:{{ q.rot }}; transition:transform .25s ease; color:#059669;\">\n              <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ q.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 22px 20px; font-size:15px; line-height:1.65; color:#4B5750; font-weight:500;\">{{ q.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FINAL CTA -->\n  <div style=\"max-width:1180px; margin:0 auto; padding:0 24px 96px;\">\n    <div class=\"kl-reveal\" style=\"border-radius:28px; background:#0A0F0D; background-image:radial-gradient(70% 120% at 50% 0%, rgba(5,150,105,0.22), transparent 60%); padding:72px 32px; text-align:center; color:#fff; position:relative; overflow:hidden;\">\n      <div aria-hidden=\"true\" style=\"position:absolute; bottom:-120px; left:50%; transform:translateX(-50%); width:520px; height:320px; background:radial-gradient(circle, rgba(16,185,129,0.18), transparent 68%); filter:blur(12px); animation:klfloat 16s ease-in-out infinite; pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:clamp(28px,4.4vw,48px); letter-spacing:-0.03em; line-height:1.05; margin:0 0 18px;\">Cafe kamu layak sistem yang proper.<\u002Fh2>\n      <p style=\"font-size:17px; line-height:1.6; color:#AEBCB4; font-weight:500; max-width:520px; margin:0 auto 32px;\">Coba gratis 30 hari. Tanpa kartu kredit, tanpa syarat ribet. Kalau nggak cocok, tinggal berhenti.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:12px;\">\n        <a href=\"{{ registerLink }}\" class=\"kl-btn-e kl-btn-d\" style=\"display:inline-flex; align-items:center; gap:9px; background:#10B981; color:#04231A; font-size:16px; font-weight:800; padding:15px 28px; border-radius:14px;\">Daftar gratis sekarang\n          <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"{{ waLink }}\" class=\"kl-btn-o\" style=\"display:inline-flex; align-items:center; gap:9px; background:transparent; color:#fff; font-size:16px; font-weight:700; padding:15px 24px; border-radius:14px; border:1px solid #2A382F;\">Tanya via WhatsApp<\u002Fa>\n      <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- AI ASSISTANT FAB + CHAT -->\n  <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed; inset:0; z-index:90; display:flex; align-items:flex-end; justify-content:flex-end; padding:24px;\">\n      <div sc-camel-on-click=\"{{ closeChat }}\" style=\"position:absolute; inset:0; background:rgba(10,15,13,0.4); backdrop-filter:blur(2px); animation:kfup .3s ease-out both;\"><\u002Fdiv>\n      <div style=\"position:relative; width:400px; max-width:100%; height:600px; max-height:82vh; background:#F6F7F4; border-radius:24px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 30px 80px -20px rgba(10,15,13,0.5); border:1px solid #E7E5DE; animation:kfup .35s ease-out both;\">\n        <div style=\"flex-shrink:0; padding:16px 18px; display:flex; align-items:center; gap:12px; background:#0A0F0D; color:#fff;\">\n          <span style=\"width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,#10B981,#047857); display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n            <svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.14-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.14a.5.5 0 0 1 .96 0L14.06 8.5A2 2 0 0 0 15.5 9.94l6.14 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.14a.5.5 0 0 1-.96 0z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <div style=\"flex:1; min-width:0;\">\n            <div style=\"font-family:'Syne',sans-serif; font-weight:800; font-size:16px;\">Tanya Kasira<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:5px; margin-top:1px;\"><span style=\"width:6px; height:6px; border-radius:50%; background:#34D399;\"><\u002Fspan><span style=\"font-size:11.5px; color:#8CA095; font-weight:500;\">Biasanya bales instan<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <button sc-camel-on-click=\"{{ closeChat }}\" style=\"width:34px; height:34px; border-radius:999px; border:1px solid #22302A; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff;\">\n            <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18\"><\u002Fpath><path d=\"m6 6 12 12\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"kl-chat\" style=\"flex:1; min-height:0; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px;\">\n          <sc-if value=\"{{ chatEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"padding:4px 2px;\">\n              <div style=\"font-size:15px; font-weight:700; color:#0B1512; line-height:1.45;\">Hai! 👋 Aku bantu jelasin Kasira buat cafe kamu.<\u002Fdiv>\n              <div style=\"font-size:13.5px; color:#5A655F; font-weight:500; margin-top:6px; line-height:1.5;\">Tanya apa aja — fitur, harga, cara mulai. Atau pilih di bawah:<\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:8px; margin-top:16px;\">\n                <sc-for list=\"{{ chatSuggestions }}\" as=\"sg\" hint-placeholder-count=\"4\">\n                  <button sc-camel-on-click=\"{{ sg.onClick }}\" style=\"text-align:left; background:#fff; border:1px solid #E7E5DE; border-radius:13px; padding:12px 14px; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; font-size:13.5px; font-weight:600; color:#2C3833;\">{{ sg.t }}<\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ chat }}\" as=\"m\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex; justify-content:{{ m.align }};\">\n              <div style=\"max-width:84%; padding:11px 14px; border-radius:{{ m.radius }}; background:{{ m.bg }}; color:{{ m.color }}; border:{{ m.border }}; font-size:14px; line-height:1.55; white-space:pre-wrap;\">{{ m.text }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ aiLoading }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex; justify-content:flex-start;\">\n              <div style=\"padding:13px 16px; border-radius:16px 16px 16px 4px; background:#fff; border:1px solid #E7E5DE; display:flex; gap:5px;\">\n                <span style=\"width:7px; height:7px; border-radius:50%; background:#10B981; animation:kfup .8s ease-in-out infinite alternate;\"><\u002Fspan>\n                <span style=\"width:7px; height:7px; border-radius:50%; background:#10B981; opacity:0.6;\"><\u002Fspan>\n                <span style=\"width:7px; height:7px; border-radius:50%; background:#10B981; opacity:0.3;\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"flex-shrink:0; padding:12px 14px 14px; background:#fff; border-top:1px solid #EAE8E1; display:flex; align-items:center; gap:9px;\">\n          <input value=\"{{ draft }}\" sc-camel-on-change=\"{{ setDraft }}\" sc-camel-on-key-down=\"{{ onDraftKey }}\" placeholder=\"Ketik pertanyaan kamu...\" style=\"flex:1; min-width:0; border:1.5px solid #E4E2DB; border-radius:999px; padding:12px 16px; outline:none; background:#FAFAF7; font-family:'Plus Jakarta Sans',sans-serif; font-size:14px; color:#0B1512;\">\n          <button sc-camel-on-click=\"{{ sendDraft }}\" style=\"width:46px; height:46px; border-radius:999px; border:none; cursor:pointer; background:#10B981; color:#04231A; display:flex; align-items:center; justify-content:center; flex-shrink:0;\">\n            <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m5 12 7-7 7 7\"><\u002Fpath><path d=\"M12 19V5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ chatClosed }}\" hint-placeholder-val=\"{{ true }}\">\n    <button sc-camel-on-click=\"{{ openChat }}\" style=\"position:fixed; right:24px; bottom:24px; z-index:80; display:inline-flex; align-items:center; gap:10px; height:58px; padding:0 22px 0 18px; border-radius:999px; border:none; cursor:pointer; background:#0A0F0D; color:#fff; box-shadow:0 14px 34px -8px rgba(10,15,13,0.5); font-family:'Plus Jakarta Sans',sans-serif;\">\n      <span style=\"width:34px; height:34px; border-radius:999px; background:linear-gradient(135deg,#10B981,#047857); display:flex; align-items:center; justify-content:center;\">\n        <svg width=\"19\" height=\"19\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.94 15.5A2 2 0 0 0 8.5 14.06l-6.14-1.58a.5.5 0 0 1 0-.96L8.5 9.94A2 2 0 0 0 9.94 8.5l1.58-6.14a.5.5 0 0 1 .96 0L14.06 8.5A2 2 0 0 0 15.5 9.94l6.14 1.58a.5.5 0 0 1 0 .96L15.5 14.06a2 2 0 0 0-1.44 1.44l-1.58 6.14a.5.5 0 0 1-.96 0z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fspan>\n      <span style=\"font-size:14.5px; font-weight:700;\">Tanya Kasira<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fsc-if>\n\n  <!-- FOOTER -->\n  <div style=\"border-top:1px solid #EAE8E1; background:#F6F5F1;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:44px 24px; display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:20px;\">\n      <a href=\"#top\" style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:22px; letter-spacing:-0.03em; color:#0B1512;\">kasira<span style=\"color:#059669;\">.<\u002Fspan><\u002Fa>\n      <div style=\"display:flex; flex-wrap:wrap; gap:22px; font-size:14px; font-weight:600; color:#5A655F;\">\n        <a href=\"#fitur\" style=\"color:#5A655F;\">Fitur<\u002Fa>\n        <a href=\"#harga\" style=\"color:#5A655F;\">Harga<\u002Fa>\n        <a href=\"{{ demoLink }}\" style=\"color:#5A655F;\">Demo<\u002Fa>\n        <a href=\"{{ loginLink }}\" style=\"color:#5A655F;\">Masuk<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-size:13px; color:#98A099; font-weight:500;\">© {{ year }} Kasira · buat UMKM Indonesia 🇮🇩<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;waNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;6285270782220&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Kontak&quot;},&quot;demoSlug&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;kasira-coffee&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Kontak&quot;},&quot;founderName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ivan&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Konten&quot;}}\">\nclass Component extends DCLogic {\n  state = { faq: 0, chatOpen: false, chat: [], draft: '', aiLoading: false };\n  componentDidMount() { this._reveal(); }\n  _reveal() {\n    if (this._io) return;\n    const run = () => {\n      const els = document.querySelectorAll('.kl-reveal');\n      if (!els.length) { setTimeout(run, 120); return; }\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { const d = e.target.getAttribute('data-delay') || 0; e.target.style.transitionDelay = d + 'ms'; e.target.classList.add('kl-in'); this._io.unobserve(e.target); } });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      els.forEach(el => this._io.observe(el));\n    };\n    setTimeout(run, 60);\n  }\n  componentDidUpdate() { const el = document.querySelector('.kl-chat'); if (el && (this.state.aiLoading || this.state.chat.length)) el.scrollTop = el.scrollHeight; this._reveal(); }\n  aiSystem() {\n    return [\n      'Kamu \"Barista Kasira\", asisten penjualan ramah di landing page Kasira — aplikasi kasir (POS) + toko online untuk cafe, warkop & UMKM F&B Indonesia.',\n      'Gaya: Bahasa Indonesia santai ala Jakarta, hangat, jujur, to-the-point. Panggil calon pelanggan \"kamu\". Maksimal 3-4 kalimat atau bullet pendek. Maksimal 1 emoji.',\n      'Tujuan kamu: bantu calon pelanggan paham Kasira dan dorong dengan halus ke arah daftar coba gratis atau lanjut ke WhatsApp. Jangan maksa/hard-sell. Kalau orang udah tertarik, arahin: \"daftar gratis 30 hari di tombol Coba gratis\" atau \"lanjut ngobrol via WhatsApp\".',\n      'Jujur soal tahap produk: Pro masih early access, Business belum rilis (Q3 2026). Jangan janjiin fitur yang belum ada.',\n      '',\n      'FAKTA PRODUK:',\n      '- Harga: Starter Rp99rb/bln (1 kasir 1 outlet, website toko gratis, QRIS BYOK, mode offline, laporan harian). Pro Rp299rb/bln (semua Starter + Warkop Pay-Items, AI asisten via WhatsApp, reservasi & kitchen display, resep+HPP, loyalty). Coba gratis 30 hari, tanpa kartu kredit, batal kapan aja.',\n      '- QRIS: BYOK (Bring Your Own Key) via Xendit — kamu daftar Xendit sendiri, tempel API key, uang masuk langsung ke rekeningmu, komisi ke Kasira NOL selamanya.',\n      '- Keunggulan khas: (1) Warkop Pay-Items — bayar per orang per item, bukan cuma bagi rata; (2) QRIS 0% komisi; (3) margin/HPP real-time per menu; (4) rangkuman & saran AI tiap pagi ke WhatsApp.',\n      '- Jalan di HP Android biasa, nggak butuh mesin khusus. Mode offline pas internet mati. Data di server Indonesia, terenkripsi & auto-backup.',\n      '- Cocok buat: cafe, warkop, resto kecil, kedai kopi, UMKM makanan/minuman.',\n    ].join('\\n');\n  }\n  async sendChat(text) {\n    const t = (text || '').trim();\n    if (!t || this.state.aiLoading) return;\n    const chat = [...this.state.chat, { role:'user', text:t }];\n    this.setState({ chat, draft:'', aiLoading:true });\n    try {\n      const messages = chat.map(m => ({ role:m.role, content:m.text }));\n      const reply = await window.claude.complete({ system:this.aiSystem(), max_tokens:600, messages });\n      this.setState(st => ({ chat:[...st.chat, { role:'assistant', text:(reply||'').trim() || 'Hmm, coba tanya lagi ya.' }], aiLoading:false }));\n    } catch (e) {\n      this.setState(st => ({ chat:[...st.chat, { role:'assistant', text:'Waduh, lagi ada gangguan. Boleh lanjut tanya via WhatsApp ya 🙏' }], aiLoading:false }));\n    }\n  }\n  renderVals() {\n    const p = this.props || {}, s = this.state;\n    const wa = (p.waNumber || '6285270782220').replace(/[^0-9]/g, '');\n    const slug = p.demoSlug || 'kasira-coffee';\n    const founderName = p.founderName || 'Ivan';\n\n    const stats = [\n      { label:'Omzet hari ini', value:'Rp 2.847.000', trend:'+12%', tb:'#ECFDF5', tc:'#047857' },\n      { label:'Total pesanan', value:'63', trend:'+5%', tb:'#ECFDF5', tc:'#047857' },\n      { label:'Produk terjual', value:'147', trend:'−2%', tb:'#FEF2F2', tc:'#DC2626' },\n      { label:'Rata-rata order', value:'Rp 45.190', trend:'+8%', tb:'#ECFDF5', tc:'#047857' },\n    ];\n    const chartRaw = [ ['Sen',48],['Sel',62],['Rab',40],['Kam',72],['Jum',56],['Sab',90],['Min',78] ];\n    const chart = chartRaw.map((c,i) => ({ d:c[0], h:c[1], bg: i===5 ? 'linear-gradient(180deg,#10B981,#059669)' : '#D7EDE2', lc: i===5 ? '#059669' : '#9AA39D' }));\n    const bestsellers = [\n      { rank:1, name:'Kopi Gula Aren', sold:25, price:'Rp 21.000', bg:'#FEF3C7', c:'#B45309' },\n      { rank:2, name:'Croissant Butter', sold:18, price:'Rp 25.000', bg:'#F1F0EB', c:'#6B7280' },\n      { rank:3, name:'Es Teh Manis', sold:10, price:'Rp 8.000', bg:'#FDECE3', c:'#C2620F' },\n      { rank:4, name:'Nasi Goreng Spesial', sold:8, price:'Rp 35.000', bg:'#EDE9FE', c:'#7C3AED' },\n    ];\n\n    const pains = [\n      { bad:'Tutup shift, hitung cash selisih terus', good:'Rekap cash + QRIS otomatis' },\n      { bad:'Pelanggan nanya menu, kirim foto satu-satu', good:'Website toko online sendiri' },\n      { bad:'Nggak tau menu mana untung, mana buntung', good:'Margin real-time per produk' },\n      { bad:'Bayar komisi 0,7% tiap transaksi QRIS', good:'QRIS BYOK, nol komisi' },\n    ];\n    const diffs = [\n      { no:'01', title:'Bayar per orang, ala warkop beneran.', body:'Lima orang nongkrong di satu meja, masing-masing bayar item sendiri, ada yang nyusul, ada yang cabut duluan. Kasir tinggal centang item yang mau dibayar — sisanya nempel di tab. Kompetitor cuma bisa bagi rata.', tag:'Warkop Pay-Items' },\n      { no:'02', title:'QRIS langsung ke rekening kamu. Komisi ke Kasira: nol.', body:'Daftar Xendit sendiri (BYOK), tempel API key, uang tiap transaksi masuk langsung ke rekening kamu — bypass Kasira. Bukan \"gratis 6 bulan lalu kena potong\". Nol, selamanya.', tag:'BYOK Xendit · 0% komisi' },\n      { no:'03', title:'Tahu untung-rugi tiap menu, bukan cuma omzet.', body:'Masukin HPP pas restock, dashboard hitung margin per produk otomatis. Muncul alert kalau margin Kopi Susu turun dari 60% ke 45% bulan ini — biar kamu bisa gerak sebelum rugi.', tag:'Margin tracking' },\n      { no:'04', title:'Rangkuman & saran mampir ke WhatsApp tiap pagi.', body:'Buka WA pagi hari, AI Kasira udah kirim: omzet kemarin, menu yang turun, sampai saran stok buat hari ini. Nyambung ke transaksi toko kamu — bukan chatbot generik.', tag:'AI Kopi Asisten · Pro' },\n    ];\n    const pillars = [\n      { title:'Kasir yang tahan banting', body:'Mati lampu atau WiFi ngadat, kasir tetap jalan. Data sync otomatis pas online lagi.', items:['Mode offline','Print struk bluetooth','Split bill & open tab'] },\n      { title:'Toko online jadi seketika', body:'Daftar, website toko langsung live di kasira.online/namamu. Sebar ke WA & IG.', items:['Storefront gratis','Terima order sendiri','Reservasi meja (Pro)'] },\n      { title:'Dapur & stok terkendali', body:'Pantau stok bahan, resep & HPP, sampai layar dapur pas jam rame.', items:['Alert stok rendah','Resep & HPP','Kitchen Display (Pro)'] },\n    ];\n\n    const reg = '/register';\n    const plans = [\n      { name:'Starter', tagline:'Buat warung & kios kecil', price:'99rb', badge:'Siap pakai', badgeBg:'#ECFDF5', badgeColor:'#047857',\n        cardBg:'#fff', cardBorder:'1px solid #E7E5DE', shadow:'0 1px 2px rgba(11,21,18,0.04)',\n        nameColor:'#0B1512', subColor:'#6B756F', featColor:'#2C3833', checkColor:'#059669',\n        features:['1 kasir + 1 outlet','Website toko gratis','QRIS BYOK (nol komisi)','Mode offline','Margin & laporan harian'],\n        cta:'Mulai gratis', ctaLink:reg, ctaBg:'#F2F1EC', ctaColor:'#0B1512', ctaBorder:'1px solid #E4E2DB' },\n      { name:'Pro', tagline:'Pilihan utama cafe hits', price:'299rb', badge:'Early access', badgeBg:'#FEF3C7', badgeColor:'#B45309',\n        cardBg:'#0A0F0D', cardBorder:'1px solid #12201B', shadow:'0 30px 60px -24px rgba(5,150,105,0.45)',\n        nameColor:'#fff', subColor:'#8CA095', featColor:'#D3DED8', checkColor:'#34D399',\n        features:['Semua Starter, plus:','Warkop Pay-Items ⭐','AI Kopi Asisten via WA','Reservasi & Kitchen Display','Resep + HPP, loyalty points'],\n        cta:'Mulai Pro 30 hari', ctaLink:reg + '?tier=pro', ctaBg:'#10B981', ctaColor:'#04231A', ctaBorder:'1px solid transparent' },\n    ];\n\n    const rawFaq = [\n      { q:'Beneran gratis 30 hari?', a:'Ya, 30 hari penuh tanpa kartu kredit. Batal kapan aja, nggak ada penalti.' },\n      { q:'QRIS-nya kena potongan ke Kasira?', a:'Nggak. Kamu daftar Xendit sendiri (BYOK), tempel API key di setelan, dan uang tiap transaksi QRIS langsung masuk ke rekening kamu. Kasira nol komisi, selamanya.' },\n      { q:'Kenapa harus daftar Xendit sendiri (BYOK)?', a:'Karena kamu settle langsung tanpa lewat Kasira, kami nggak perlu KYC platform — jadi harganya bisa lebih murah dan kontrol pembayaran penuh di tangan kamu.' },\n      { q:'Bisa dipakai di HP Android biasa?', a:'Bisa. App kasir jalan di HP Android manapun, nggak butuh tablet atau mesin khusus.' },\n      { q:'Kalau internet mati gimana?', a:'Kasir tetap bisa transaksi offline. Data otomatis kesinkron begitu internet nyala lagi.' },\n      { q:'Data saya aman?', a:'Data disimpan di server Indonesia dengan enkripsi, dan di-backup otomatis berkala.' },\n    ];\n    const faqs = rawFaq.map((f,i) => ({ q:f.q, a:f.a, open: s.faq === i, rot: s.faq === i ? 'rotate(180deg)' : 'rotate(0deg)', onToggle: () => this.setState({ faq: s.faq === i ? -1 : i }) }));\n\n    return {\n      registerLink: reg, loginLink: '/login', demoLink: '/' + slug,\n      waLink: 'https://wa.me/' + wa + '?text=Halo%20Kasira%2C%20saya%20tertarik%20coba',\n      stats, chart, bestsellers, pains, diffs, pillars, plans, faqs,\n      founderName, founderInitial: founderName.trim().charAt(0).toUpperCase() || 'I',\n      year: new Date().getFullYear(),\n      chatOpen: s.chatOpen, chatClosed: !s.chatOpen, aiLoading: s.aiLoading, draft: s.draft, chatEmpty: s.chat.length === 0,\n      openChat: () => this.setState({ chatOpen:true }), closeChat: () => this.setState({ chatOpen:false }),\n      setDraft: (e) => this.setState({ draft:e.target.value }),\n      sendDraft: () => this.sendChat(this.state.draft),\n      onDraftKey: (e) => { if (e.key === 'Enter') this.sendChat(this.state.draft); },\n      chat: s.chat.map((m,i) => ({ key:i, text:m.text, isUser:m.role==='user',\n        align: m.role==='user' ? 'flex-end' : 'flex-start',\n        bg: m.role==='user' ? '#0B1512' : '#fff', color: m.role==='user' ? '#fff' : '#0B1512',\n        border: m.role==='user' ? '1px solid transparent' : '1px solid #E7E5DE',\n        radius: m.role==='user' ? '16px 16px 4px 16px' : '16px 16px 16px 4px' })),\n      chatSuggestions: [\n        { t:'Kasira cocok buat warkop kecil?', onClick: () => this.sendChat('Kasira cocok buat warkop kecil?') },\n        { t:'Bedanya sama Moka/Pawoon apa?', onClick: () => this.sendChat('Bedanya Kasira sama Moka atau Pawoon apa?') },\n        { t:'QRIS beneran nol komisi?', onClick: () => this.sendChat('QRIS-nya beneran nol komisi? Jelasin dong') },\n        { t:'Berapa harganya buat 1 cafe?', onClick: () => this.sendChat('Berapa total biayanya buat 1 cafe kecil?') },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
