name: kasira_kasir
description: Kasira POS Cashier Application
publish_to: 'none'
version: 1.5.1+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  drift: ^2.14.0
  drift_flutter: ^0.1.0
  print_bluetooth_thermal: ^1.1.1
  permission_handler: ^11.3.0
  geolocator: ^13.0.2
  cached_network_image: ^3.3.0
  path_provider: ^2.1.2
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.0.0
  qr_flutter: ^4.1.0
  sqlite3_flutter_libs: ^0.5.24
  package_info_plus: ^8.0.0
  path: ^1.9.0
  uuid: ^4.3.3
  http: ^1.2.0
  url_launcher: ^6.2.0
  crypto: ^3.0.3
  lucide_icons_flutter: ^3.1.14+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  drift_dev: ^2.14.0
  flutter_launcher_icons: ^0.13.1

# Ikon aplikasi. Folder android/ TIDAK disimpan di repo — CI bikin ulang lewat
# `flutter create`, yang selalu ngasih ikon Flutter bawaan (logo biru). Jadi
# ikon Kasira HARUS di-generate ulang tiap build, sesudah `flutter create`.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/kasira_icon.png"
  adaptive_icon_background: "#0B7A55"
  # Foreground dibikin terpisah tanpa background dan isinya dikecilin ke ~62%,
  # supaya nggak kepotong waktu Android nge-mask jadi bulat di sebagian HP.
  adaptive_icon_foreground: "assets/icon/kasira_icon_fg.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
